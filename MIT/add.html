<!-- add.html -->
<!-- Page for adding new transport logs -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Logs</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<header>
  <h1>LagerSync</h1>

  <!-- Shared navigation -->
<nav id="mainNav"></nav>

  <p id="userBadge"></p>
</header>

<div class="container">

  <h2>Add Logs for Transport</h2>

  <!-- Log submission form -->
  <form id="logForm" onsubmit="addLogs(event)">

    <label>Owner Type</label>
    <select id="ownerType">
      <option value="Private">Private Forest Owner</option>
      <option value="SIDG">SIDG</option>
    </select>

    <label>Location</label>
    <input id="location" placeholder="Forest location / GPS" required>

    <label>Volume (m³)</label>
    <input id="volume" type="number" required>

    <label>Pickup Date</label>
    <input id="date" type="date" required>

    <button type="submit" class="button">Submit Logs</button>

  </form>

</div>

</body>
</html>
